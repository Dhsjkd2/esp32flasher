<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>ESP32-S3 Firmware Flasher</title>
  <script
    type="module"
    src="https://unpkg.com/esp-web-tools@10/dist/web/install-button.js?module">
  </script>
</head>

<body>
  <h1>ESP32-S3 Firmware Flasher</h1>

  <p>
    Use Chrome, Edge, or another browser with Web Serial support.
    Plug in the ESP32-S3 by USB, then press Install.
  </p>

  <esp-web-install-button manifest="manifest.json">
    <button slot="activate">Install Firmware</button>
    <span slot="unsupported">
      Your browser does not support Web Serial. Use Chrome or Edge on desktop.
    </span>
    <span slot="not-allowed">
      This page must be opened over HTTPS.
    </span>
  </esp-web-install-button>
</body>
</html>
